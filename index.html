<!DOCTYPE html>
<html>
<head>
  <title>Go Live Countdown</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #254d49;
      height: 100%;
      overflow: hidden;
      font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
      color: white;
    }

    /* 🟢 OUTER CONTAINER (auto scales) */
    #scaleWrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🟢 FIXED DESIGN CANVAS */
    #wrapper {
      width: 900px;
      height: 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 25px;
      text-align: center;

      transform-origin: center;
    }

    #title {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    #daysNumber {
      font-size: 90px;
      font-weight: bold;
      line-height: 1;
    }

    #daysLabel {
      font-size: 16px;
      opacity: 0.8;
      letter-spacing: 3px;
    }

    #timeBlock {
      font-size: 28px;
      opacity: 0.9;
    }

    #barWrapper {
      width: 80%;
      max-width: 700px;
    }

    #barContainer {
      height: 20px;
      border: 2px solid white;
      border-radius: 10px;
      padding: 2px;
      overflow: hidden;
    }

    #bar {
      height: 100%;
      width: 0%;
      background: white;
      border-radius: 6px;
      transition: width 0.5s linear;
    }
  </style>
</head>

<body>

<div id="scaleWrap">
  <div id="wrapper">

    <div id="title">Go Live</div>

    <div>
      <div id="daysNumber">0</div>
      <div id="daysLabel">Days Remaining</div>
    </div>

    <div id="timeBlock">0h 0m 0s</div>

    <div id="barWrapper">
      <div id="barContainer">
        <div id="bar"></div>
      </div>
    </div>

  </div>
</div>

<script>
  const startDate = new Date("2026-01-01T00:00:00").getTime();
  const endDate = new Date("2026-09-20T08:00:00").getTime();

  function scaleToFit() {
    const wrapper = document.getElementById("wrapper");

    const scaleX = window.innerWidth / 900;
    const scaleY = window.innerHeight / 500;

    const scale = Math.min(scaleX, scaleY);

    wrapper.style.transform = `scale(${scale})`;
  }

  function update() {
    const now = new Date().getTime();
    const remaining = endDate - now;

    if (remaining <= 0) {
      document.getElementById("daysNumber").innerText = "0";
      document.getElementById("timeBlock").innerText = "0h 0m 0s";
      document.getElementById("bar").style.width = "100%";
      return;
    }

    const days = Math.floor(remaining / 86400000);
    const hours = Math.floor((remaining / 3600000) % 24);
    const minutes = Math.floor((remaining / 60000) % 60);
    const seconds = Math.floor((remaining / 1000) % 60);

    document.getElementById("daysNumber").innerText = days;
    document.getElementById("timeBlock").innerText =
      `${hours}h ${minutes}m ${seconds}s`;

    const progress = ((now - startDate) / (endDate - startDate)) * 100;

    document.getElementById("bar").style.width =
      now <= startDate ? "0%" : progress + "%";
  }

  window.addEventListener("resize", scaleToFit);

  scaleToFit();
  update();
  setInterval(update, 1000);
</script>

</body>
</html>
