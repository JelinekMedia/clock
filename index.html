<!DOCTYPE html>
<html>
<head>
  <title>Go Live Countdown</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #254d49;
      font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
      color: white;
      overflow: hidden;
    }

    #wrapper {
      width: 100%;
      height: 100%;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;
      box-sizing: border-box;
      padding: 8px;
    }

    #title {
      font-size: clamp(12px, 2vw, 16px);
      font-weight: 600;
      letter-spacing: 1px;
      margin: 0;
    }

    #days {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: bold;
      margin: 0;
      line-height: 1;
    }

    #label {
      font-size: clamp(8px, 1.5vw, 11px);
      opacity: 0.8;
      margin: 0;
    }

    #time {
      font-size: clamp(10px, 2vw, 14px);
      opacity: 0.9;
      margin: 0;
    }

    #barContainer {
      width: 90%;
      max-width: 700px;
      height: 10px;
      border: 1px solid white;
      border-radius: 6px;
      padding: 1px;
      box-sizing: border-box;
      margin-top: 6px;
    }

    #bar {
      height: 100%;
      width: 0%;
      background: white;
      border-radius: 5px;
      transition: width 0.5s linear;
    }
  </style>
</head>

<body>

<div id="wrapper">

  <div id="title">Go Live</div>

  <div id="days">0</div>

  <div id="label">Days Remaining</div>

  <div id="time">0h 0m 0s</div>

  <div id="barContainer">
    <div id="bar"></div>
  </div>

</div>

<script>
  const startDate = new Date("2026-01-01T00:00:00").getTime();
  const endDate = new Date("2026-09-20T08:00:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const remaining = endDate - now;

    if (remaining <= 0) {
      document.getElementById("days").innerText = "0";
      document.getElementById("time").innerText = "0h 0m 0s";
      document.getElementById("bar").style.width = "100%";
      return;
    }

    const days = Math.floor(remaining / 86400000);
    const hours = Math.floor((remaining / 3600000) % 24);
    const minutes = Math.floor((remaining / 60000) % 60);
    const seconds = Math.floor((remaining / 1000) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("time").innerText =
      hours + "h " + minutes + "m " + seconds + "s";

    const progress = ((now - startDate) / (endDate - startDate)) * 100;

    document.getElementById("bar").style.width =
      now <= startDate ? "0%" : progress + "%";
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
