<!DOCTYPE html>
<html>
<head>
  <title>Go-Live Countdown</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #254d49;
      font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
      color: white;
      overflow: hidden;
    }

    #wrapper {
      width: 100%;
      height: 100%;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      box-sizing: border-box;
      padding: 10px;
      gap: 14px;
      text-align: center;
    }

    #title {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: 2px;
      margin: 0;
    }

    #metrics {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }

    #daysBlock, #timeBlock {
      text-align: center;
    }

    #days {
      font-size: 64px;
      font-weight: bold;
      line-height: 1;
      margin: 0;
    }

    #daysLabel {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 2px;
    }

    #time {
      font-size: 28px;
      font-weight: 400;
      margin: 0;
    }

    #timeLabel {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 2px;
    }

    #barWrapper {
      width: 60%;
      max-width: 700px;
    }

    #barContainer {
      width: 100%;
      height: 15px;
      border: 1px solid white;
      border-radius: 6px;
      padding: 1px;
      box-sizing: border-box;

      position: relative;
      overflow: hidden;
    }

    /* ACTUAL PROGRESS BAR */
    #bar {
      height: 100%;
      width: 0%;
      background: white;
      border-radius: 5px;
      transition: width 0.5s linear;

      position: relative;
      z-index: 1;
    }

    /* 🔥 SHIMMER OVERLAY ANIMATION */
    #barContainer::after {
      content: "";
      position: absolute;
      top: 0;
      left: -60%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
      );
      animation: shimmer 2.5s infinite;
      z-index: 2;
    }

    @keyframes shimmer {
      0% {
        left: -60%;
      }
      100% {
        left: 120%;
      }
    }
  </style>
</head>

<body>

<div id="wrapper">

  <div id="title">Go-Live</div>

  <div id="metrics">

    <div id="daysBlock">
      <div id="days">0</div>
      <div id="daysLabel">Days Remaining</div>
    </div>

    <div id="timeBlock">
      <div id="time">0h 0m 0s</div>
      <div id="timeLabel">H M S</div>
    </div>

  </div>

  <div id="barWrapper">
    <div id="barContainer">
      <div id="bar"></div>
    </div>
  </div>

</div>

<script>
  const startDate = new Date("2026-01-01T00:00:00").getTime();
  const endDate = new Date("2026-09-20T08:00:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const remaining = endDate - now;

    if (remaining <= 0) {
      document.getElementById("days").innerText = "0";
      document.getElementById("time").innerText = "0h 0m 0s";
      document.getElementById("bar").style.width = "100%";
      return;
    }

    const days = Math.floor(remaining / 86400000);
    const hours = Math.floor((remaining / 3600000) % 24);
    const minutes = Math.floor((remaining / 60000) % 60);
    const seconds = Math.floor((remaining / 1000) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("time").innerText =
      hours + "h " + minutes + "m " + seconds + "s";

    const progress = ((now - startDate) / (endDate - startDate)) * 100;

    document.getElementById("bar").style.width =
      now <= startDate ? "0%" : progress + "%";
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
