<!DOCTYPE html>
<html>
<head>
  <title>Go-Live Countdown</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
      color: white;
    }

    #stage {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #card {
      width: 700px;
      transform-origin: center;
    }

    #inner {
      background: #254d49;
      border-radius: 20px;
      border: 2px solid white;

      padding: 10px;
      box-sizing: border-box;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      gap: 10px;
    }

    #title {
      font-size: 40px;
      font-weight: 600;
      margin: 0;
    }

    #metrics {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    #days {
      font-size: 64px;
      font-weight: bold;
      line-height: 1;
      margin: 0;
    }

    #daysLabel {
      font-size: 11px;
      opacity: 0.8;
      text-align: center;
      margin-top: 2px;
    }

    #time {
      font-size: 28px;
      margin: 0;
    }

    /* BAR WRAPPER */
    #barContainer {
      width: 60%;
      height: 15px;
      border: 1px solid white;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    /* PROGRESS FILL */
    #bar {
      height: 100%;
      width: 0%;
      background: white;
      position: relative;
      z-index: 1;
    }

    /* 🔥 SHIMMER ANIMATION LAYER */
    #barContainer::after {
      content: "";
      position: absolute;
      top: 0;
      left: -60%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
      );
      animation: shimmer 2.2s infinite;
      z-index: 2;
    }

    @keyframes shimmer {
      0% { left: -60%; }
      100% { left: 120%; }
    }
  </style>
</head>

<body>

<div id="stage">

  <div id="card">

    <div id="inner">

      <div id="title">Go-Live</div>

      <div id="metrics">

        <div style="
          display:flex;
          flex-direction:column;
          align-items:center;
          text-align:center;
        ">
          <div id="days">0</div>
          <div id="daysLabel">Days Remaining</div>
        </div>

        <div>
          <div id="time">0h 0m 0s</div>
        </div>

      </div>

      <div id="barContainer">
        <div id="bar"></div>
      </div>

    </div>

  </div>

</div>

<script>
  const startDate = new Date("2026-01-01").getTime();
  const endDate = new Date("2026-09-20T08:00:00").getTime();

  function update() {
    const now = Date.now();
    const remaining = endDate - now;

    const days = Math.max(0, Math.floor(remaining / 86400000));
    const hours = Math.floor((remaining / 3600000) % 24);
    const minutes = Math.floor((remaining / 60000) % 60);
    const seconds = Math.floor((remaining / 1000) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("time").innerText =
      hours + "h " + minutes + "m " + seconds + "s";

    const progress = ((now - startDate) / (endDate - startDate)) * 100;
    document.getElementById("bar").style.width =
      Math.max(0, Math.min(100, progress)) + "%";
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
